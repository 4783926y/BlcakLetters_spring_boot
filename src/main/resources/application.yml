spring:
  datasource:
    url: jdbc:mysql://localhost:3306/receipt_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: # TODO: 나중에 실제 비밀번호 입력
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: # 
            client-secret: # TODO: 카카오 Client Secret 입력 (TODO: 카카오 REST API 키 입력선택)
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

cloud:
  aws:
    credentials:
      access-key: # TODO: AWS Access Key 입력
      secret-key: # TODO: AWS Secret Key 입력
    region:
      static: ap-northeast-2 # 예: 서울 리전
    s3:
      bucket: # TODO: S3 버킷 이름 입력

jwt:
  secret: # TODO: JWT 서명용 비밀키 (임의의 문자열 Base64 인코딩)
  expiration: 86400000 # 24시간
